<!doctype html>
<html lang="en" style="background: #121116">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcelle</title>
    <style>
      /* Launch shell: the window must open into the room's ink, never a blank
         page waiting for the bundle. React's first render replaces #root's
         children, so this vanishes exactly when the real UI is ready. */
      #launch-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #121116;
        color: #aaa5b0;
        font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #launch-shell svg {
        opacity: 0;
        animation: launch-fade 0.6s ease 0.15s forwards;
      }
      #launch-shell span {
        opacity: 0;
        animation: launch-fade 0.6s ease 0.35s forwards;
      }
      @keyframes launch-fade {
        to { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #launch-shell svg,
        #launch-shell span {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>

  <body style="margin: 0; background: #121116">
    <div id="root">
      <div id="launch-shell" aria-hidden="true">
        <svg width="34" height="40" viewBox="0 0 34 40" fill="none">
          <g transform="translate(2 1.5) scale(0.0655)">
            <g transform="translate(-292 -263)">
              <path d="M375 623 L654 710 Q668 715 661 730 L635 778 Q628 790 614 784 L345 682 Z" fill="#9d80d8"/>
              <path d="M507 279 Q523 263 541 274 Q550 279 557 294 L731 739 Q738 757 727 772 L702 800 Q692 812 677 805 L637 785 L470 337 Q463 319 473 304 Z" fill="#7857b0"/>
              <path d="M494 277 Q507 264 524 269 Q542 275 548 292 Q552 303 546 318 L381 737 Q376 749 387 758 L365 797 Q356 813 339 810 Q331 809 323 801 L304 781 Q292 769 298 750 L479 308 Q484 288 494 277 Z" fill="#c3acf2"/>
              <path d="M672 781 L707 785" stroke="#dfbc72" stroke-width="9" stroke-linecap="round"/>
              <circle cx="672" cy="781" r="4.5" fill="#fff0b5"/>
            </g>
          </g>
        </svg>
        <span>Opening your rooms…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
