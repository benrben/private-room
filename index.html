<!doctype html>
<html lang="en" style="background: #121116">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcelle</title>
    <style>
      /* Launch shell: the window must open into the room's ink, never a blank
         page waiting for the bundle. React's first render replaces #root's
         children, so this vanishes exactly when the real UI is ready. */
      #launch-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #121116;
        color: #aaa5b0;
        font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #launch-shell svg {
        opacity: 0;
        animation: launch-fade 0.6s ease 0.15s forwards;
      }
      #launch-shell span {
        opacity: 0;
        animation: launch-fade 0.6s ease 0.35s forwards;
      }
      @keyframes launch-fade {
        to { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #launch-shell svg,
        #launch-shell span {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>

  <body style="margin: 0; background: #121116">
    <div id="root">
      <div id="launch-shell" aria-hidden="true">
        <svg width="34" height="40" viewBox="0 0 34 40" fill="none"
          stroke="#ae93e7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 6 L28 34 M17 6 L6 34 M10.5 25 H23.5" />
        </svg>
        <span>Opening your rooms…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
