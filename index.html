<!doctype html>
<html lang="en" style="background: #0e1014">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Room</title>
    <style>
      /* Launch shell: the window must open into the room's ink, never a blank
         page waiting for the bundle. React's first render replaces #root's
         children, so this vanishes exactly when the real UI is ready. */
      #launch-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #0e1014;
        color: #9597a8;
        font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #launch-shell svg {
        opacity: 0;
        animation: launch-fade 0.6s ease 0.15s forwards;
      }
      #launch-shell span {
        opacity: 0;
        animation: launch-fade 0.6s ease 0.35s forwards;
      }
      @keyframes launch-fade {
        to { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #launch-shell svg,
        #launch-shell span {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>

  <body style="margin: 0; background: #0e1014">
    <div id="root">
      <div id="launch-shell" aria-hidden="true">
        <svg width="34" height="40" viewBox="0 0 34 40" fill="none">
          <path
            d="M3 37 V17 a14 14 0 0 1 28 0 V37"
            stroke="#8b7cf6"
            stroke-width="2.5"
            stroke-linecap="round"
          />
          <circle cx="17" cy="19" r="3.5" fill="#8b7cf6" />
          <path
            d="M17 21 v7"
            stroke="#8b7cf6"
            stroke-width="3"
            stroke-linecap="round"
          />
        </svg>
        <span>Opening your rooms…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
