<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="180" y1="120" x2="840" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20332F"/>
      <stop offset="1" stop-color="#101A19"/>
    </linearGradient>
    <linearGradient id="paper" x1="246" y1="240" x2="528" y2="784" gradientUnits="userSpaceOnUse">
