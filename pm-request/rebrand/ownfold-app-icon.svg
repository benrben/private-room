    </linearGradient>
    <filter id="shadow" x="140" y="160" width="744" height="704" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#07100F" flood-opacity="0.38"/>
