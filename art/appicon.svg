    <path d="M507 279 Q523 263 541 274 Q550 279 557 294 L731 739 Q738 757 727 772 L702 800 Q692 812 677 805 L637 785 L470 337 Q463 319 473 304 Z" fill="url(#ribbon-right)"/>
    <path d="M540 276 Q551 281 558 296 L731 739" fill="none" stroke="#d4c3f6" stroke-width="5" opacity="0.64"/>
    <path d="M637 785 L677 805 Q692 812 702 800 L727 772 Q735 761 731 744 L692 779 Q684 786 673 781 L650 769 Z" fill="url(#inner-face)"/>
    <path d="M494 277 Q507 264 524 269 Q542 275 548 292 Q552 303 546 318 L381 737 Q376 749 387 758 L365 797 Q356 813 339 810 Q331 809 323 801 L304 781 Q292 769 298 750 L479 308 Q484 288 494 277 Z" fill="url(#ribbon-front)"/>
    <path d="M496 279 Q509 266 525 271 Q541 276 547 292" fill="none" stroke="url(#edge-light)" stroke-width="7" stroke-linecap="round"/>
    <path d="M302 750 L479 308" fill="none" stroke="#eadfff" stroke-width="4" opacity="0.43"/>
    <path d="M304 781 Q292 769 298 750 L307 729 Q304 756 322 768 L353 786 Q363 792 371 782 L365 797 Q356 813 339 810 Q331 809 323 801 Z" fill="url(#inner-face)"/>
    <path d="M304 781 Q293 770 298 750" fill="none" stroke="#9b7bd2" stroke-width="3" opacity="0.72"/>
    <path d="M381 737 L546 318" fill="none" stroke="#65449a" stroke-width="4" opacity="0.65"/>
    <path d="M470 337 L637 785" fill="none" stroke="#cdb9f3" stroke-width="3" opacity="0.30"/>
    <path d="M672 781 L707 785" fill="none" stroke="url(#amber)" stroke-width="7" stroke-linecap="round" filter="url(#amber-glow)"/>
    <circle cx="672" cy="781" r="3.4" fill="#fff0b5"/>
  </g>
</svg>
