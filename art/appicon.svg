<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Arcelle folded A app icon</title>
  <desc id="desc">A sculptural lavender ribbon folded into an interlocking capital A over a dark technical grid, with a small amber encryption seam.</desc>
  <defs>
    <clipPath id="squircle-clip"><rect x="43" y="43" width="938" height="938" rx="226"/></clipPath>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#17151c"/><stop offset="0.48" stop-color="#121116"/><stop offset="1" stop-color="#0d0c10"/></linearGradient>
    <radialGradient id="ink-glow" cx="50%" cy="48%" r="62%"><stop offset="0" stop-color="#24202d" stop-opacity="0.58"/><stop offset="0.58" stop-color="#121116" stop-opacity="0"/><stop offset="1" stop-color="#050407" stop-opacity="0.35"/></radialGradient>
    <pattern id="minor-grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#65449a" stroke-width="1.5" opacity="0.24"/></pattern>
    <pattern id="major-grid" width="192" height="192" patternUnits="userSpaceOnUse"><path d="M192 0H0V192" fill="none" stroke="#65449a" stroke-width="5" opacity="0.47"/></pattern>
    <linearGradient id="ribbon-front" x1="0.18" y1="0.05" x2="0.85" y2="0.96"><stop offset="0" stop-color="#dbcafb"/><stop offset="0.20" stop-color="#c3acf2"/><stop offset="0.52" stop-color="#ae93e7"/><stop offset="0.82" stop-color="#8a68c3"/><stop offset="1" stop-color="#65449a"/></linearGradient>
    <linearGradient id="ribbon-right" x1="0.08" y1="0" x2="0.92" y2="1"><stop offset="0" stop-color="#a987df"/><stop offset="0.36" stop-color="#8967c1"/><stop offset="0.72" stop-color="#6f4fa6"/><stop offset="1" stop-color="#513478"/></linearGradient>
    <linearGradient id="ribbon-cross" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8060b8"/><stop offset="0.48" stop-color="#ae93e7"/><stop offset="1" stop-color="#54377d"/></linearGradient>
    <linearGradient id="inner-face" x1="0" y1="0" x2="0.9" y2="1"><stop offset="0" stop-color="#211b2b"/><stop offset="0.55" stop-color="#15121b"/><stop offset="1" stop-color="#08070b"/></linearGradient>
    <linearGradient id="edge-light" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f0e8ff" stop-opacity="0.95"/><stop offset="0.48" stop-color="#d4c3f6" stop-opacity="0.38"/><stop offset="1" stop-color="#ae93e7" stop-opacity="0"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff0b5"/><stop offset="0.38" stop-color="#dfbc72"/><stop offset="1" stop-color="#876116"/></linearGradient>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%"><feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" seed="17" result="noise"/><feColorMatrix in="noise" type="saturate" values="0" result="gray"/><feComponentTransfer in="gray" result="faint-noise"><feFuncA type="table" tableValues="0 0.06"/></feComponentTransfer><feBlend in="SourceGraphic" in2="faint-noise" mode="soft-light"/></filter>
    <filter id="mark-shadow" x="-40%" y="-40%" width="180%" height="190%"><feDropShadow dx="0" dy="26" stdDeviation="22" flood-color="#000000" flood-opacity="0.72"/><feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#65449a" flood-opacity="0.30"/></filter>
    <filter id="amber-glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g clip-path="url(#squircle-clip)">
