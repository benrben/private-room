    <rect x="43" y="43" width="938" height="938" fill="url(#minor-grid)"/>
    <rect x="43" y="43" width="938" height="938" fill="url(#major-grid)"/>
    <rect x="43" y="43" width="938" height="938" fill="url(#ink-glow)"/>
    <rect x="43" y="43" width="938" height="938" rx="226" fill="transparent" filter="url(#paper)"/>
  </g>
  <rect x="45" y="45" width="934" height="934" rx="224" fill="none" stroke="#40334f" stroke-width="4" opacity="0.56"/>
